<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harness</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1a1b26;
    --surface: #24283b;
    --border: #3b4261;
    --accent: #7aa2f7;
    --accent2: #9ece6a;
    --warn: #e0af68;
    --text: #cdd6f4;
    --dim: #a9b1d6;
    --radius: 8px;
    --font-mono: 'JetBrains Mono', 'Fira Mono', 'Cascadia Code', monospace;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 { font-size: 16px; color: var(--accent); letter-spacing: .05em; }
  header .status {
    font-size: 12px;
    color: var(--dim);
    margin-left: auto;
  }
  header .status.connected { color: var(--accent2); }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 820px;
    width: fit-content;
    padding: 10px 14px;
    border-radius: var(--radius);
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user {
    background: var(--surface);
    border: 1px solid var(--border);
    align-self: flex-end;
    color: var(--text);
  }
  .msg.assistant {
    background: transparent;
    border: 1px solid var(--border);
    align-self: flex-start;
    color: var(--text);
  }
  .msg.tool {
    background: transparent;
    border: 1px solid #2d3148;
    align-self: flex-start;
    color: var(--warn);
    font-size: 12px;
  }
  .msg.error {
    background: #3d1515;
    border: 1px solid #7f1d1d;
    align-self: flex-start;
    color: #f87171;
  }
  /* code blocks inside assistant messages */
  .msg pre {
    background: #0d1117;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    overflow-x: auto;
    margin: 6px 0;
    font-size: 13px;
  }
  .msg code { font-family: var(--font-mono); }
  .msg p { margin: 4px 0; }
  /* typing cursor */
  .cursor::after {
    content: '▋';
    animation: blink 0.8s step-end infinite;
    color: var(--accent);
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  footer {
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  #prompt {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    padding: 10px 12px;
    resize: none;
    min-height: 44px;
    max-height: 200px;
    outline: none;
    transition: border-color .15s;
  }
  #prompt:focus { border-color: var(--accent); }
  #send {
    background: var(--accent);
    color: #1a1b26;
    border: none;
    border-radius: var(--radius);
    padding: 10px 18px;
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .15s;
    white-space: nowrap;
    height: 44px;
  }
  #send:disabled { opacity: .45; cursor: default; }
  #send:not(:disabled):hover { opacity: .85; }
</style>
</head>
<body>
<header>
  <h1>⬡ harness</h1>
  <span id="status" class="status">connecting…</span>
</header>
<div id="chat"></div>
<footer>
  <textarea id="prompt" placeholder="Ask anything… (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
  <button id="send" disabled>Send</button>
</footer>

<script>
  const chat   = document.getElementById('chat');
  const prompt = document.getElementById('prompt');
  const send   = document.getElementById('send');
  const status = document.getElementById('status');

  let sessionId = null;
  let streaming  = false;

  // ── helpers ──────────────────────────────────────────────────────────────

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /** Very small markdown renderer: code fences + inline code + bold + italic */
  function renderMarkdown(text) {
    // code fences
    text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${escapeHtml(code.trimEnd())}</code></pre>`
    );
    // inline code
    text = text.replace(/`([^`]+)`/g, (_, c) => `<code>${escapeHtml(c)}</code>`);
    // bold
    text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    // italic
    text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    // paragraphs (double newline)
    const paras = text.split(/\n\n+/);
    return paras.map(p => {
      if (p.startsWith('<pre>')) return p;
      return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
    }).join('');
  }

  function addMsg(cls, html, id) {
    const div = document.createElement('div');
    div.className = 'msg ' + cls;
    if (id) div.id = id;
    div.innerHTML = html;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function setStatus(text, connected) {
    status.textContent = text;
    status.className = 'status' + (connected ? ' connected' : '');
  }

  // ── auto-resize textarea ──────────────────────────────────────────────────

  prompt.addEventListener('input', () => {
    prompt.style.height = 'auto';
    prompt.style.height = Math.min(prompt.scrollHeight, 200) + 'px';
  });

  prompt.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!send.disabled) sendMessage();
    }
  });

  send.addEventListener('click', sendMessage);

  // ── health check ─────────────────────────────────────────────────────────

  async function checkHealth() {
    try {
      const r = await fetch('/api/health');
      if (r.ok) {
        setStatus('ready', true);
        send.disabled = false;
        return;
      }
    } catch {}
    setStatus('server unreachable', false);
    setTimeout(checkHealth, 3000);
  }

  checkHealth();

  // ── send message ──────────────────────────────────────────────────────────

  async function sendMessage() {
    const text = prompt.value.trim();
    if (!text || streaming) return;

    prompt.value = '';
    prompt.style.height = 'auto';
    send.disabled = true;
    streaming = true;
    setStatus('thinking…', true);

    addMsg('user', escapeHtml(text));

    const assistantId = 'msg-' + Date.now();
    const assistantDiv = addMsg('assistant cursor', '', assistantId);
    let assistantText = '';

    const body = { prompt: text };
    if (sessionId) body.session_id = sessionId;

    try {
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      if (!resp.ok) {
        const msg = await resp.text();
        assistantDiv.className = 'msg error';
        assistantDiv.textContent = 'Server error: ' + msg;
        return;
      }

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });

        let nl;
        while ((nl = buf.indexOf('\n')) !== -1) {
          const line = buf.slice(0, nl).replace(/\r$/, '');
          buf = buf.slice(nl + 1);

          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6);
          let evt;
          try { evt = JSON.parse(data); } catch { continue; }

          switch (evt.type) {
            case 'text_chunk':
              assistantText += evt.content || '';
              assistantDiv.innerHTML = renderMarkdown(assistantText);
              assistantDiv.className = 'msg assistant cursor';
              chat.scrollTop = chat.scrollHeight;
              break;
            case 'tool_start': {
              const name = evt.name || '?';
              addMsg('tool', `→ <strong>${escapeHtml(name)}</strong>`);
              break;
            }
            case 'tool_result': {
              const name = evt.name || '?';
              const last = chat.querySelector('.msg.tool:last-child');
              if (last) last.innerHTML = `← <strong>${escapeHtml(name)}</strong>`;
              break;
            }
            case 'session_id':
              sessionId = evt.id;
              break;
            case 'done':
              assistantDiv.className = 'msg assistant';
              break;
            case 'error':
              addMsg('error', escapeHtml(evt.message || 'unknown error'));
              break;
          }
        }
      }
    } catch (err) {
      assistantDiv.className = 'msg error';
      assistantDiv.textContent = 'Request failed: ' + err.message;
    } finally {
      streaming = false;
      send.disabled = false;
      setStatus('ready', true);
      // remove cursor class in case done event was missing
      const el = document.getElementById(assistantId);
      if (el) el.classList.remove('cursor');
      prompt.focus();
    }
  }
</script>
</body>
</html>
