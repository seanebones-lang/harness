name: CI

on:
  push:
    branches: [main, master, "claude/**"]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --all-targets

      - name: Test
        run: cargo test --all

  install-scripts:
    name: Install script (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            kind: unix
          - os: macos-latest
            kind: unix
          - os: windows-latest
            kind: windows

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run scripts/install.sh
        if: matrix.kind == 'unix'
        env:
          HARNESS_INSTALL_DIR: ${{ runner.temp }}/harness-ci-bin
        run: |
          mkdir -p "$HARNESS_INSTALL_DIR"
          bash scripts/install.sh
          "$HARNESS_INSTALL_DIR/harness" --version
          "$HARNESS_INSTALL_DIR/harness" --help >/dev/null

      - name: Run scripts/install.ps1
        if: matrix.kind == 'windows'
        env:
          HARNESS_INSTALL_DIR: ${{ runner.temp }}\harness-ci-bin
        run: |
          New-Item -ItemType Directory -Force -Path $env:HARNESS_INSTALL_DIR | Out-Null
          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/install.ps1
          & "$env:HARNESS_INSTALL_DIR\harness.exe" --version
          & "$env:HARNESS_INSTALL_DIR\harness.exe" --help | Out-Null
