# Harness configuration — copy to ~/.harness/config.toml or .harness/config.toml
# Run `harness init` to generate this automatically.

[provider]
# Your Anthropic API key. Can also be set via ANTHROPIC_API_KEY env var.
# api_key = "sk-ant-..."

# April 2026 model choices:
#   Anthropic: claude-opus-4-7 | claude-sonnet-4-6 | claude-haiku-4-5
#   xAI:       grok-4.20-0309-reasoning | grok-4-1-fast-reasoning
#   OpenAI:    gpt-5.5 | gpt-5.4 | gpt-5.4-mini | o4-mini
#   Ollama:    qwen3-coder:30b | qwen2.5-coder:32b (local, free)
model = "claude-sonnet-4-6"

max_tokens = 8192
temperature = 0.7

# Override the API base URL (useful for local proxies or testing)
# base_url = "https://api.anthropic.com/v1"

[agent]
system_prompt = """
You are a powerful coding assistant running in a terminal.

Available tools:
  read_file, write_file     — read or overwrite files
  patch_file                — surgical old→new text replacement (prefer this over write_file for edits)
  list_dir                  — list directory contents
  shell                     — run shell commands (build, test, git, etc.)
  search_code               — regex search across the codebase
  spawn_agent               — run a sub-agent with base tools for parallel tasks
  browser (when enabled)    — Chrome CDP: navigate, screenshot, click, fill forms
  MCP tools (when loaded)   — any tools registered via .harness/mcp.json

Guidelines:
  - Prefer patch_file over write_file for targeted edits.
  - Always run tests or build commands after changes to verify correctness.
  - Be concise. Prefer making changes over explaining them.
  - When editing multiple files, use spawn_agent for parallelism.
  - In plan mode (--plan flag), destructive calls pause for user approval.
"""

[memory]
# Set to false to disable semantic memory recall.
enabled = true

# Embedding model for semantic search.
# "nomic-embed-text" (local, via Ollama) or "voyage-3.5" (Anthropic recommended, requires VOYAGE_API_KEY)
embed_model = "nomic-embed-text"

# Override the SQLite path for the memory store.
# db_path = "~/.harness/memory.db"

[session]
# Path to the SQLite sessions database.
# db_path = "~/.harness/sessions.db"

[mcp]
# Path to your MCP server configuration.
# Harness also checks .harness/mcp.json and ~/.harness/mcp.json automatically.
# config_path = ".harness/mcp.json"

[budget]
# Spending limits — Harness warns at 80% and blocks at 100%.
# daily_usd = 5.00     # max daily spend in USD
# monthly_usd = 50.00  # max monthly spend in USD

[computer_use]
# ⚠️  DANGER: When enabled, the agent can control your mouse, keyboard, and screen.
# Only enable with Claude 4.7+ (claude-opus-4-7).
# Requires: cliclick (macOS: brew install cliclick) or xdotool (Linux).
# enabled = false

[notifications]
# Desktop notifications (macOS Notification Center / Linux libnotify).
# enabled = true              # set to false to disable all notifications
# on_background_done = true   # notify when a background run finishes
# on_autotest_fail = true     # notify when auto-test fails
# on_budget = true            # notify at 80% / 100% of budget thresholds

[native_tools]
# Enable provider-managed server-side tools.
# These are billed per call by the provider (e.g. xAI: $5/1k calls).
# web_search = false      # provider-native web search (Anthropic, xAI)
# code_execution = false  # sandboxed code execution (Anthropic bash, xAI)
# x_search = false        # X (Twitter) post search (xAI only)

[browser]
# Enable the CDP browser tool. Requires Chrome launched with:
#   chrome --remote-debugging-port=9222 --headless
# Can also be enabled at runtime with: harness --browser
# enabled = false
# url = "http://localhost:9222"

# Example .harness/mcp.json:
# {
#   "mcpServers": {
#     "filesystem": {
#       "command": "npx",
#       "args": ["-y", "@modelcontextprotocol/server-filesystem", "/home/user"],
#       "env": {}
#     },
#     "github": {
#       "command": "npx",
#       "args": ["-y", "@modelcontextprotocol/server-github"],
#       "env": { "GITHUB_TOKEN": "ghp_..." }
#     }
#   }
# }

# ── Phase E (optional) ──────────────────────────────────────────────────────
# Uncomment keys below only when you add matching sections to harness Config,
# or paste into a sidecar — unknown top-level tables break `harness` today.

[router]
# Smart defaults when unset: anthropic → xai → openai → ollama (see CLAUDE.md).
# default = "anthropic"
# fast_model = "anthropic:claude-haiku-4-5"
# heavy_model = "anthropic:claude-opus-4-7"
# embed_model = "ollama:nomic-embed-text"
# fallback = ["anthropic", "xai", "openai", "ollama"]

